name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check code formatting
        run: |
          echo "🎨 Checking code formatting"
          cargo fmt -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy lints (default features)
        run: |
          echo "🔍 Running clippy lints (default features)"
          cargo clippy --all-targets -- -D warnings

      - name: Run clippy lints (no default features)
        run: |
          echo "🔍 Running clippy lints (--no-default-features)"
          cargo clippy --no-default-features --all-targets -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download test model
        run: |
          echo "📦 Setting up test model"
          mkdir -p ~/.cache/models/gguf
          # Note: Tests expect GPT-2 model at standard path
          # If model doesn't exist, tests will be skipped or fail gracefully

      - name: Run test suite (default features)
        run: |
          echo "🧪 Running tests (default features)"
          cargo test --verbose

      - name: Run test suite (no default features)
        run: |
          echo "🧪 Running tests (--no-default-features: sequential backend, no Rayon)"
          cargo test --no-default-features --verbose

  build:
    name: Build Verification
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build library
        run: |
          echo "🔨 Building shimmytok on ${{ matrix.os }}"
          cargo build --release --verbose

      - name: Verify library builds
        run: |
          echo "✅ Build successful on ${{ matrix.os }}"

  wasm:
    name: WASM Compatibility (no-default-features)
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build for WASM (no default features)
        run: |
          echo "🌊 Building shimmytok for wasm32-unknown-unknown with --no-default-features"
          cargo build --target wasm32-unknown-unknown --no-default-features --release

      - name: Verify no parallel/threading deps in WASM build
        run: |
          echo "🔍 Confirming Rayon and crossbeam are excluded from the WASM dependency graph"
          cargo tree --target wasm32-unknown-unknown --no-default-features --edges normal \
            | grep -E 'rayon|crossbeam' \
            && { echo "❌ Found parallel deps in WASM build"; exit 1; } \
            || echo "✅ No Rayon/crossbeam in WASM dependency graph"
